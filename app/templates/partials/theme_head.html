{# Tematización global FlyPaper — FOUC-safe + CSS variables (6 temas) #}
{# Incluir lo antes posible dentro de <head>. Clave localStorage: "theme" #}
<script>
(function () {
  var CLAVE = 'theme';
  var VALIDOS = { light: 1, dark: 1, hacker: 1, lcd: 1, anime: 1, 'apple-glass': 1 };
  var tema = 'dark';
  try {
    var guardado = localStorage.getItem(CLAVE);
    if (!guardado) {
      var legado = localStorage.getItem('academia-theme');
      if (legado && VALIDOS[legado]) {
        guardado = legado;
        localStorage.setItem(CLAVE, legado);
      }
    }
    if (guardado && VALIDOS[guardado]) tema = guardado;
  } catch (e) { /* modo privado */ }
  document.documentElement.setAttribute('data-theme', tema);
  document.documentElement.dataset.theme = tema;
  ['theme-light', 'theme-dark', 'theme-hacker', 'theme-lcd', 'theme-anime', 'theme-apple-glass']
    .forEach(function (c) { document.documentElement.classList.remove(c); });
  document.documentElement.classList.add('theme-' + tema);
})();
</script>

    transition: background-color 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
