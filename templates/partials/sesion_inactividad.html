{# Temporizador de inactividad (15 min) en /search, /blog y /objetivos. #}
<script>
(function () {
  const SEGUNDOS = {{ sesion_inactividad_seg|default(900) }};
  const MS = SEGUNDOS * 1000;
  const LOGUEADO = {{ 'true' if sesion_logueado else 'false' }};

  let temporizador = null;

  function expirarPorInactividad() {
    if (LOGUEADO) {
      window.location.href = '/logout?reason=timeout';
      return;
    }
    fetch('/logout?reason=timeout&guest=1', {
      credentials: 'same-origin',
      headers: { Accept: 'application/json' },
    }).catch(function () {}).finally(reiniciarTemporizador);
  }

  function reiniciarTemporizador() {
    if (temporizador !== null) {
      clearTimeout(temporizador);
    }
    temporizador = setTimeout(expirarPorInactividad, MS);
  }

  ['mousemove', 'keypress', 'keydown', 'click', 'scroll', 'touchstart'].forEach(function (ev) {
    document.addEventListener(ev, reiniciarTemporizador, { passive: true });
  });

  reiniciarTemporizador();
})();
</script>
