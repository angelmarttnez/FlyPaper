<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - FlyPaper Corp</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: radial-gradient(ellipse at top, #0a1124, #05080f);
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: rgba(17, 24, 39, 0.95);
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      text-align: center;
    }

    .logo-circle {
      width: 64px;
      height: 64px;
      background: #3b82f6;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-weight: 700;
      font-size: 24px;
      color: #fff;
      letter-spacing: 1px;
    }

    .brand {
      font-size: 22px;
      font-weight: 600;
      color: #f8fafc;
      margin-bottom: 4px;
    }

    .title {
      font-size: 20px;
      font-weight: 600;
      color: #f8fafc;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 24px;
    }

    .form-group {
      text-align: left;
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #cbd5e1;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    .form-group input::placeholder {
      color: #64748b;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 4px;
    }

    .btn:hover {
      background: #2563eb;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .link-row {
      margin-top: 20px;
      font-size: 13px;
      color: #94a3b8;
    }

    .link-row a {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 500;
    }

    .link-row a:hover {
      text-decoration: underline;
    }

    .alert-error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      color: #fca5a5;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .alert-success {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.25);
      color: #86efac;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    footer {
      margin-top: 24px;
      font-size: 12px;
      color: #64748b;
    }

    @media (max-width: 480px) {
      .card {
        padding: 32px 24px;
        margin: 0 16px;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo-circle">FP</div>
    <div class="brand">FlyPaper</div>
    <div class="title">Crear cuenta</div>
    <div class="subtitle">Accede a la plataforma interna</div>

    {% if error %}
    <div class="alert-error">{{ error }}</div>
    {% endif %}

    {% if exito %}
    <div class="alert-success">{{ exito }}</div>
    {% endif %}

    <form method="POST" action="/register">
      <div class="form-group">
        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" name="usuario" placeholder="Elige un nombre de usuario" required autocomplete="username">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" required minlength="8" autocomplete="new-password">
      </div>

      <div class="form-group">
        <label for="confirmar_password">Confirmar contraseña</label>
        <input type="password" id="confirmar_password" name="confirmar_password" placeholder="Repite la contraseña" required minlength="8" autocomplete="new-password">
      </div>

      <button type="submit" class="btn">Registrarse</button>
    </form>

    <div class="link-row">
      ¿Ya tienes cuenta? <a href="/login">Iniciar sesión</a>
    </div>
  </div>

  <footer>&copy; 2026 FlyPaper Corp. All rights reserved.</footer>

</body>
</html>
