<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FlyPaper · Iniciar sesión</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(ellipse at top, #1a2744 0%, #0a1124 60%, #05080f 100%);
    color: #e6ecff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 400px;
    background: rgba(20, 30, 55, 0.7);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(120, 160, 255, 0.15);
    border-radius: 16px;
    padding: 40px 32px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
  }
  .logo {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4f7cff, #2547c9);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 26px;
    color: #fff;
    margin: 0 auto 20px;
    box-shadow: 0 8px 24px rgba(79, 124, 255, 0.4);
    letter-spacing: 1px;
  }
  h1 {
    text-align: center;
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .subtitle {
    text-align: center;
    color: #8aa0c8;
    font-size: 14px;
    margin-bottom: 28px;
  }
  .field { margin-bottom: 16px; }
  label {
    display: block;
    font-size: 13px;
    color: #b8c8e8;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 12px 14px;
    background: rgba(10, 17, 36, 0.6);
    border: 1px solid rgba(120, 160, 255, 0.2);
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  input:focus {
    border-color: #4f7cff;
    box-shadow: 0 0 0 3px rgba(79, 124, 255, 0.2);
  }
  button {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    background: linear-gradient(135deg, #4f7cff, #2547c9);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform .1s, box-shadow .2s;
  }
  button:hover { box-shadow: 0 8px 20px rgba(79, 124, 255, 0.4); }
  button:active { transform: translateY(1px); }
  /* Enlace secundario: acceso al blog sin credenciales (menos prominente que el login) */
  .guest-link {
    display: block;
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
    color: #7a8fb8;
    text-decoration: none;
    font-weight: 500;
    transition: color .15s;
  }
  .guest-link:hover { color: #b8c8e8; }
  .error {
    background: rgba(220, 50, 70, 0.15);
    border: 1px solid rgba(220, 50, 70, 0.4);
    color: #ff7080;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 18px;
    text-align: center;
  }
  footer {
    margin-top: 28px;
    color: #5f7299;
    font-size: 12px;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">FP</div>
    <h1>FlyPaper</h1>
    <p class="subtitle">Inicia sesión en tu cuenta</p>

    <div id="error-msg" class="error" style="display:none;">
      Usuario o contraseña incorrectos. Acceso denegado.
    </div>

    <form method="POST" action="/login">
      <div class="field">
        <label for="username">Usuario</label>
        <input type="text" id="username" name="username" required autocomplete="username" />
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" />
      </div>
      <button type="submit">Iniciar sesión</button>
    </form>

    <a href="/blog" class="guest-link">Continuar como invitado →</a>
  </div>

  <footer>© 2026 Nexus Corp. All rights reserved.</footer>

  <script>
    if (new URLSearchParams(window.location.search).get('error') === '1') {
      document.getElementById('error-msg').style.display = 'block';
    }
  </script>
</body>
</html>
