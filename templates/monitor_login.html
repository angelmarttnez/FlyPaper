<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlyPaper · Acceso Analista</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    background-color: #0a0e1a;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    width: 100%;
    max-width: 400px;
    background-color: #111827;
    border: 1px solid #1e293b;
    border-radius: 12px;
    padding: 40px;
  }
  .icon-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 18px;
  }
  .icon-wrap svg {
    width: 48px;
    height: 48px;
    color: #3b82f6;
  }
  h1 {
    text-align: center;
    font-size: 22px;
    font-weight: 600;
    color: #e2e8f0;
  }
  .subtitle {
    text-align: center;
    font-size: 14px;
    color: #94a3b8;
    margin-top: 6px;
  }
  .error {
    margin-top: 20px;
    background-color: #1a0a0a;
    border-left: 3px solid #ef4444;
    color: #ef4444;
    font-size: 13px;
    padding: 10px 14px;
    border-radius: 6px;
  }
  form {
    margin-top: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label {
    font-size: 13px;
    color: #94a3b8;
    font-weight: 500;
  }
  input[type="text"], input[type="password"] {
    width: 100%;
    background-color: #0a0e1a;
    border: 1px solid #1e293b;
    color: #e2e8f0;
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
    transition: border-color 0.15s ease;
  }
  input[type="text"]::placeholder, input[type="password"]::placeholder {
    color: #475569;
  }
  input[type="text"]:focus, input[type="password"]:focus {
    border-color: #3b82f6;
    outline: none;
  }
  button[type="submit"] {
    width: 100%;
    background-color: #3b82f6;
    color: #ffffff;
    padding: 12px;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 500;
    border: none;
    cursor: pointer;
    font-family: inherit;
    margin-top: 4px;
    transition: background-color 0.15s ease;
  }
  button[type="submit"]:hover {
    background-color: #2563eb;
  }
  .back-admin {
    display: block;
    margin-top: 18px;
    text-align: center;
    font-size: 12px;
    color: #64748b;
    text-decoration: none;
    background: none;
  }
  .back-admin:hover {
    color: #94a3b8;
    text-decoration: underline;
  }
  .footer-card {
    margin-top: 24px;
    text-align: center;
    font-size: 11px;
    color: #475569;
  }
  .footer-page {
    margin-top: 24px;
    text-align: center;
    font-size: 11px;
    color: #1e293b;
  }
</style>
</head>
<body>
  {% block content %}
  <div class="card">
    <div class="icon-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="4" y="11" width="16" height="10" rx="2"></rect>
        <path d="M8 11V8a4 4 0 0 1 8 0v3"></path>
        <circle cx="12" cy="16" r="1.2" fill="currentColor" stroke="none"></circle>
      </svg>
    </div>
    <h1>FlyPaper · Acceso Analista</h1>
    <p class="subtitle">Panel de Monitorización Seguro</p>

    {% if error %}
    <div class="error" role="alert">{{ error }}</div>
    {% endif %}

    <form action="/monitor/login" method="POST" autocomplete="off">
      {% if csrf_token %}
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      {% endif %}
      <div class="field">
        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" name="usuario" placeholder="admin" autocomplete="off" required>
      </div>
      <div class="field">
        <label for="contrasena">Contraseña</label>
        <input type="password" id="contrasena" name="contrasena" placeholder="••••••••" autocomplete="off" required>
      </div>
      <button type="submit">Iniciar sesión</button>
    </form>

    <a class="back-admin" href="/admin">← Volver al panel</a>

    <p class="footer-card">Acceso restringido a personal autorizado</p>
  </div>
  {% endblock %}
  <p class="footer-page">NexusCorp Internal Systems v2.4.1</p>
</body>
</html>
